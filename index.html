<!-- ════════════════════════════════════════════
     ACCESSIBILITY WIDGET (pure JS, no React)
════════════════════════════════════════════ -->
<button id="a11y-btn" aria-label="פתח תפריט נגישות" aria-expanded="false" aria-controls="a11y-panel">
  ♿
</button>
<div id="a11y-panel" role="region" aria-label="אפשרויות נגישות">
  <div class="a11y-title">♿ נגישות</div>
  <button id="a11y-text-lg"   aria-pressed="false"><span class="a11y-icon">🔤</span> הגדל טקסט</button>
  <button id="a11y-contrast"  aria-pressed="false"><span class="a11y-icon">🌗</span> ניגודיות גבוהה</button>
  <button id="a11y-grayscale" aria-pressed="false"><span class="a11y-icon">⚫</span> גווני אפור</button>
  <button id="a11y-reset"><span class="a11y-icon">↺</span> איפוס</button>
</div>

<script>
(function(){
  var btn    = document.getElementById('a11y-btn');
  var panel  = document.getElementById('a11y-panel');
  var bLarge = document.getElementById('a11y-text-lg');
  var bContr = document.getElementById('a11y-contrast');
  var bGray  = document.getElementById('a11y-grayscale');
  var bReset = document.getElementById('a11y-reset');
  var body   = document.body;

  /* Restore from localStorage */
  var saved = JSON.parse(localStorage.getItem('a11y')||'{}');
  if (saved.large)    { body.classList.add('a11y-large-text');    bLarge.classList.add('active'); bLarge.setAttribute('aria-pressed','true'); }
  if (saved.contrast) { body.classList.add('a11y-high-contrast'); bContr.classList.add('active'); bContr.setAttribute('aria-pressed','true'); }
  if (saved.gray)     { body.classList.add('a11y-grayscale');     bGray.classList.add('active');  bGray.setAttribute('aria-pressed','true'); }

  function save(){
    localStorage.setItem('a11y', JSON.stringify({
      large:    body.classList.contains('a11y-large-text'),
      contrast: body.classList.contains('a11y-high-contrast'),
      gray:     body.classList.contains('a11y-grayscale'),
    }));
  }

  btn.addEventListener('click', function(){
    var isOpen = panel.classList.toggle('open');
    btn.setAttribute('aria-expanded', isOpen);
  });

  /* Close on outside click */
  document.addEventListener('click', function(e){
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
      btn.setAttribute('aria-expanded','false');
    }
  });

  function toggle(cls, el){
    var on = body.classList.toggle(cls);
    el.classList.toggle('active', on);
    el.setAttribute('aria-pressed', on);
    save();
  }

  bLarge.addEventListener('click', function(){ toggle('a11y-large-text',    bLarge); });
  bContr.addEventListener('click', function(){ toggle('a11y-high-contrast', bContr); });
  bGray.addEventListener('click',  function(){ toggle('a11y-grayscale',     bGray);  });
  bReset.addEventListener('click', function(){
    body.classList.remove('a11y-large-text','a11y-high-contrast','a11y-grayscale');
    [bLarge,bContr,bGray].forEach(function(b){ b.classList.remove('active'); b.setAttribute('aria-pressed','false'); });
    localStorage.removeItem('a11y');
  });
})();
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useCallback } = React;

/* ══════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════ */
const WEBHOOK_URL = 'YOUR_MAKE_WEBHOOK_URL';
const EVENT_NAME  = 'שיטים';
const SIZES       = ['S', 'M', 'L', 'XL', 'XXL'];

const SELECTOR_LINKS = {
  1:       'URL_1_ITEM',
  2:       'URL_2_ITEMS',
  3:       'URL_3_ITEMS',
  default: 'URL_GENERAL',
};

const priceFor = (n) => {
  if (n <= 0) return 0;
  if (n === 1) return 129;
  if (n === 2) return 219;
  if (n === 3) return 309;
  return 309 + (n - 3) * 100;
};

/* ══════════════════════════════════════════════════════
   3 DESIGNS — color is fixed per design
   All files live next to index.html (no subdirectory)
══════════════════════════════════════════════════════ */
const DESIGNS = [
  { id: 1, label: 'A', color: "בז'",  shirt: 'shirt1.jpg', tank: 'tank1.jpg' },
  { id: 2, label: 'B', color: 'שחור', shirt: 'shirt2.jpg', tank: 'tank2.jpg' },
  { id: 3, label: 'C', color: 'לבן',  shirt: 'shirt3.jpg', tank: 'tank3.jpg' },
];

/* ══════════════════════════════════════════════════════
   DEBUG IMAGE — red box if file is missing
══════════════════════════════════════════════════════ */
function Img({ src, alt, className = '' }) {
  const [err, setErr] = useState(false);
  if (err) return <div className={`img-missing ${className}`}>Missing:<br />{src}</div>;
  return <img src={src} alt={alt} className={className} onError={() => setErr(true)} loading="lazy" />;
}

/* ══════════════════════════════════════════════════════
   NAV LOGO
══════════════════════════════════════════════════════ */
function NavLogo() {
  const [err, setErr] = useState(false);
  return (
    <div className="flex items-center gap-2">
      {!err
        ? <img src="logo.png" alt="Shtutnik" className="h-9 w-auto object-contain" onError={() => setErr(true)} />
        : <span className="neon-text font-black text-xl">👽 Shtutnik</span>
      }
    </div>

}

/* ══════════════════════════════════════════════════════
   DESIGN CARD
══════════════════════════════════════════════════════ */
function DesignCard({ design, onAdd }) {
  const [type, setType]           = useState('חולצה');
  const [size, setSize]           = useState('');
  const [justAdded, setJustAdded] = useState(false);

  const activeImg = type === 'חולצה' ? design.shirt : design.tank;

  const handleAdd = () => {
    if (!size) return;
    onAdd({ uid: `${design.id}-${type}-${size}-${Date.now()}`, design, type, size, image: activeImg });
    setJustAdded(true);
    setSize('');
    setTimeout(() => setJustAdded(false), 1800);
  };

  return (
    <div className="rounded-3xl border border-white/10 bg-white/[0.03] hover:border-neonPink/30 transition-all duration-300 overflow-hidden flex flex-col">

      {/* Main image */}
      <div className="relative aspect-square overflow-hidden bg-ink">
        <Img src={activeImg} alt={`דיזיין ${design.label} · ${type}`}
          className="w-full h-full object-cover transition-opacity duration-300" />
        <div className="absolute top-3 start-3 flex flex-col gap-1">
          <div className="px-2.5 py-1 rounded-full bg-ink/80 backdrop-blur border border-white/20 font-black text-sm text-white">
            {design.label}
          </div>
          <div className="px-2.5 py-1 rounded-full bg-ink/80 backdrop-blur border border-white/10 text-[11px] font-bold text-white/80">
            {design.color}
          </div>
        </div>
      </div>

      {/* Type thumbnails */}
      <div className="flex gap-2 px-4 pt-4">
        {[
          { key: 'חולצה',  src: design.shirt, label: 'חולצה' },
          { key: 'גופייה', src: design.tank,  label: 'גופייה' },
        ].map(({ key, src, label }) => (
          <button key={key}
            onClick={() => { setType(key); setSize(''); }}
            aria-pressed={type === key}
            className={`relative flex-1 rounded-xl overflow-hidden border-2 transition-all ${
              type === key ? 'border-neonCyan shadow-glow-cyan' : 'border-white/10 hover:border-white/30'
            }`}
            style={{ aspectRatio: '1/1' }}
          >
            <Img src={src} alt={label} className="w-full h-full object-cover" />
            <div className={`absolute inset-0 flex items-end justify-center pb-1.5 text-[11px] font-black transition ${
              type === key ? 'bg-neonCyan/25 text-white' : 'bg-black/45 text-white/75'
            }`}>{label}</div>
          </button>
        ))}
      </div>

      <div className="p-4 flex flex-col gap-4 flex-1">
        {/* Size pills */}
        <div>
          <div className="text-[11px] font-bold text-white/50 mb-2">מידה</div>
          <div className="flex gap-2 flex-wrap" dir="ltr">
            {SIZES.map((s) => (
              <button key={s}
                onClick={() => setSize(s)}
                aria-pressed={size === s}
                /* min 44×44px tap target */
                className={`min-w-[44px] h-11 px-3 rounded-full text-sm font-black border transition ${
                  size === s
                    ? 'border-neonCyan bg-neonCyan/20 text-neonCyan shadow-glow-cyan'
                    : 'border-white/20 text-white/80 hover:border-white/50 active:scale-95'
                }`}
              >{s}</button>
            ))}
          </div>
        </div>

        {/* Add button — full-width, min 52px for easy thumb tap */}
        <button
          onClick={handleAdd}
          disabled={!size}
          className={`rounded-full w-full py-4 text-base font-black transition min-h-[52px] ${
            justAdded
              ? 'bg-[#25D366] text-white scale-95'
              : size
                ? 'bg-gradient-to-r from-neonPink to-neonPurple text-white shadow-glow-pink hover:scale-[1.02] active:scale-95'
                : 'bg-white/[0.08] text-white/35 cursor-not-allowed'

        >

        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════════ */
function Lightbox({ src, alt, onClose }) {
  React.useEffect(() => {
    if (!src) return;
    document.body.classList.add('no-scroll');
    const fn = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => { document.body.classList.remove('no-scroll'); window.removeEventListener('keydown', fn); };
  }, [src, onClose]);
  if (!src) return null;
  return (
    <div role="dialog" aria-modal="true" aria-label="תצוגה מורחבת"
      className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 animate-fadein"
      onClick={onClose}>
      <button onClick={(e) => { e.stopPropagation(); onClose(); }}
        aria-label="סגור"
        className="absolute top-4 end-4 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 text-white text-2xl flex items-center justify-center">
        ✕
      </button>
      <Img src={src} alt={alt} className="max-w-[92vw] max-h-[88vh] object-contain rounded-2xl shadow-glow-pink" />
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════ */
function App() {
  const [cart, setCart]         = useState([]);
  const [lightbox, setLightbox] = useState(null);
  const [name, setName]         = useState('');
  const [loading, setLoading]   = useState(false);

  const totalCount = cart.length;
  const total      = priceFor(totalCount);

  const addToCart      = useCallback((item) => setCart((p) => [...p, item]), []);
  const removeFromCart = useCallback((uid)  => setCart((p) => p.filter((x) => x.uid !== uid)), []);

  const submitOrder = async () => {
    if (!name.trim() || totalCount === 0 || loading) return;
    setLoading(true);
    const payload = {
      name: name.trim(),
      items: cart.map((it) => `דיזיין ${it.design.label} (${it.design.color}) · ${it.type} · ${it.size}`).join(', '),
      total,
      count: totalCount,
      event: EVENT_NAME,
      timestamp: new Date().toISOString(),
    };
    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (_) {}
    window.location.href = SELECTOR_LINKS[totalCount] || SELECTOR_LINKS.default;
  };

          </div>

          <h1 className="text-5xl md:text-7xl font-black leading-[1.05] mb-6">
            <span className="neon-text">שטותניק</span><br />
            ברמות הכי גבוהות.
          </h1>

          {/* 3-step flow */}
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-center gap-4 md:gap-6 mb-8 max-w-2xl mx-auto px-2">
            {[
              { icon: '📱', text: 'סורקים את החולצה' },
              { icon: '🎵', text: 'פלייליסט עם כל האומנים שניגנו לנו' },
              { icon: '❤️', text: 'שומרים את החוויה קרוב ללב לכל מקום' },
            ].map(({ icon, text }, i) => (
              <div key={i} className="flex sm:flex-col items-center gap-3 sm:gap-2 text-start sm:text-center flex-1">
                {i > 0 && <div className="hidden sm:block text-white/30 text-2xl">↓</div>}
                <div className="text-3xl shrink-0">{icon}</div>
                <div className="text-white/80 text-sm leading-snug">{text}</div>
              </div>
            ))}
          </div>

          <div className="flex flex-col sm:flex-row gap-3 justify-center">
            <button onClick={() => goto('catalog')}
              className="rounded-full px-8 py-4 text-base md:text-lg font-black bg-gradient-to-r from-neonPink via-neonPurple to-neonCyan text-white shadow-glow-pink hover:scale-105 active:scale-95 transition min-h-[52px]">
              🛸 לדגמים
            </button>
            <button onClick={() => goto('cart')}
              className="rounded-full px-8 py-4 text-base md:text-lg font-bold border border-white/25 hover:bg-white/[0.08] transition min-h-[52px]">
              לעגלה ↓
            </button>
          </div>

          <p className="mt-4 text-xs text-white/45">
            מסירה ידנית באירוע בלבד · כמות מוגבלת · אחרי שזה נגמר — נגמר.
          </p>
        </div>
      </section>

      {/* ── CATALOG ── */}
      <section id="catalog" className="max-w-6xl mx-auto px-4 py-12 md:py-20">
        <div className="text-center mb-8 md:mb-10">
          <div className="text-xs font-black tracking-widest text-neonPink mb-2">
            3 DESIGNS · בחר עיצוב, סוג ומידה
          </div>
          <h2 className="text-3xl md:text-5xl font-black neon-text mb-5">הדגמים</h2>

          {/* Process steps */}
          <div className="flex flex-wrap justify-center gap-2 mb-4">
            {[
              { icon: '🎨', label: '3 דיזיינים' },
              { icon: '👕', label: 'חולצה או גופייה' },
              { icon: '🖤', label: "בז' / שחור / לבן" },
              { icon: '📐', label: 'מידה S–XXL' },
            ].map(({ icon, label }, i) => (
              <div key={i} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-sm">
                <span>{icon}</span>
                <span className="font-bold text-white/80">{label}</span>
              </div>
            ))}
          </div>

          <p className="text-white/50 text-xs md:text-sm max-w-md mx-auto">
            הצבע קבוע לכל דיזיין. בחרו חולצה או גופייה, בחרו מידה — ואז הוסיפו לעגלה.
          </p>
        </div>

        {/* Cards — 1 col on phone, 2 on sm, 3 on lg */}
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          {DESIGNS.map((d) => <DesignCard key={d.id} design={d} onAdd={addToCart} />)}
        </div>
      </section>

      {/* ── SPOTIFY STORY ── */}
      <section className="bg-gradient-to-b from-ink via-[#120025] to-ink py-10 md:py-16">
        <div className="max-w-3xl mx-auto px-4 text-center">
          <div className="inline-block mb-4 px-4 py-2 rounded-2xl border border-neonCyan/30 bg-neonCyan/[0.08] font-mono text-neonCyan text-sm">
            SHTUTNIK · SPOTIFY · SHITIM
          </div>
          <h2 className="text-2xl md:text-4xl font-black mb-4">
            הברקוד על החולצה הוא <span className="neon-text">פלייליסט</span>.
          </h2>
          <p className="text-white/70 text-base md:text-lg leading-relaxed max-w-xl mx-auto">
            סורקים אותו ונפתח הפלייליסט של האירוע — כל האומנים, כל הסטים.
            הזיכרון נשמר על הבד. ❤️‍🔥
          </p>
        </div>
      </section>

      {/* ── CART & CHECKOUT ── */}
      <section id="cart" className="max-w-2xl mx-auto px-4 py-12 md:py-20">
        <div className="text-center mb-6">
          <div className="text-xs font-black tracking-widest text-neonPink mb-2">ORDER · העגלה שלך</div>
          <h2 className="text-3xl md:text-4xl font-black neon-text">בוא נסגור את זה</h2>
        </div>

        <div className="rounded-3xl border border-white/10 bg-white/[0.025] p-4 md:p-7">

          {/* Empty state */}
          {totalCount === 0 ? (
            <div className="text-center py-10">
              <div className="text-5xl mb-3">🕳️</div>
              <p className="text-white/80 mb-1 font-bold text-lg">בינתיים אין לנו פה כלום עדיין!</p>
              <p className="text-white/45 text-sm mb-6">תחזרו לדגמים, תבחרו מידה — וקדימה לרחבה.</p>
              <button onClick={() => goto('catalog')}
                className="rounded-full px-6 py-3.5 font-black text-sm bg-gradient-to-r from-neonPink to-neonPurple text-white shadow-glow-pink hover:scale-105 transition min-h-[48px]">
                🛸 לדגמים
              </button>
            </div>
          ) : (
            <>
              {/* Cart items */}
              <div className="space-y-2 mb-5">
                {cart.map((it) => (
                  <div key={it.uid} className="flex items-center gap-3 p-3 rounded-2xl border border-white/[0.08] bg-white/5">
                    <div className="w-14 h-14 rounded-xl overflow-hidden shrink-0 border border-white/10 bg-ink">
                      <Img src={it.image} alt="" className="w-full h-full object-cover" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-black text-sm">דיזיין {it.design.label} · {it.type}</div>
                      <div className="text-xs text-white/55 mt-0.5">צבע {it.design.color} · מידה {it.size}</div>
                    </div>
                    {/* Remove — 44px tap target */}
                    <button onClick={() => removeFromCart(it.uid)} aria-label="הסר פריט"
                      className="w-11 h-11 rounded-full bg-white/5 hover:bg-white/15 text-white/60 hover:text-white text-lg flex items-center justify-center transition">
                      ✕
                    </button>
                  </div>
                ))}
              </div>

              {/* Price summary */}
              <div className="flex items-center justify-between p-4 rounded-2xl border border-neonPink/25 bg-neonPink/5 mb-4">
                <div>
                  <div className="text-xs text-white/55">{totalCount} {totalCount === 1 ? 'פריט' : 'פריטים'}</div>
                  <div className="text-4xl font-black neon-text">{total}<span className="text-2xl">₪</span></div>
                </div>
                <div className="text-end text-xs text-white/50 space-y-0.5">
                  <div>1 יח׳ = 129₪</div>
                  <div>2 יח׳ = 219₪</div>
                  <div>3 יח׳ = 309₪</div>
                  {totalCount > 3 && <div className="text-neonYellow">+100₪ לכל נוסף</div>}
                </div>
              </div>

              {/* Smart upsell */}
              {totalCount === 1 && (
                <div className="mb-4 p-4 rounded-2xl border border-neonPurple/35 bg-neonPurple/[0.08] text-sm text-white/85 leading-relaxed">
                  💡 קחו עוד פריט (אולי מתנה לחבר שעף איתכם ברחבה?) והמחיר ליחידה יורד משמעותית!
                </div>
              )}
              {totalCount === 2 && (
                <div className="mb-4 p-4 rounded-2xl border border-neonCyan/35 bg-neonCyan/[0.08] text-sm text-white/85 leading-relaxed">
                  👽 פסיעה מהדיל המלא! פריט שלישי יוזיל לכם את המחיר פר יחידה למקסימום. לא תפנקו איזה שטותניק אהוב?
                </div>
              )}

              {/* Reassurance text */}
              <div className="mb-5 p-4 rounded-2xl border border-neonCyan/25 bg-neonCyan/[0.06] text-sm text-white/80 leading-relaxed">
                🔒 מלאו שם, עברו לתשלום מאובטח בסלקטור, ואנחנו נשריין לכם את המידות והדגמים! ההזמנה תחכה לכם בעמדה באירוע עם סריקת הברקוד של סלקטור.
              </div>

              {/* Name input */}
              <div className="mb-4">
                <label className="block text-xs font-black text-white/50 mb-2 tracking-wide">שם מלא</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="למשל: שגיב כהן"
                  className="w-full rounded-2xl px-4 py-3.5 bg-white/[0.06] border border-white/15 text-white placeholder-white/30 focus:border-neonCyan/60 focus:outline-none transition min-h-[52px]"
                />
              </div>

              {/* Selector CTA */}
              <button
                onClick={submitOrder}
                disabled={!name.trim() || totalCount === 0 || loading}
                className={`w-full rounded-full px-6 py-5 text-lg font-black transition min-h-[60px] ${
                  !name.trim() || loading
                    ? 'bg-white/[0.08] text-white/35 cursor-not-allowed'
                    : 'bg-gradient-to-r from-neonPurple to-neonPink text-white shadow-glow-pink hover:scale-[1.02] active:scale-95'
                }`}
              >
                {loading ? '⏳ מעביר לתשלום...' : 'מעבר לתשלום מאובטח בסלקטור 🔒'}
              </button>

              <p className="text-center text-xs text-white/40 mt-3 leading-relaxed">
                התשלום מתבצע דרך מערכת סלקטור המאובטחת. הפרטים שלכם נשמרים אצלנו לשריון הדגמים. 👽
              </p>
            </>
          )}
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer className="border-t border-white/10">
        <div className="max-w-6xl mx-auto px-4 py-10 text-center text-white/50 text-sm space-y-1.5">
          <div className="text-2xl">✌️ 👽 💜</div>
          <div className="font-black neon-text text-base">Shtutnik</div>
          <div>נתראה ב{EVENT_NAME}.</div>
          <div className="text-xs text-white/30 pt-3">
            © {new Date().getFullYear()} Shtutnik · כל הזכויות והאהבה שמורות.
          </div>
        </div>
      </footer>

      {/* ── MOBILE STICKY CART BAR ── */}
      {totalCount > 0 && (
        <div className="md:hidden fixed bottom-0 inset-x-0 z-30 bg-ink/95 backdrop-blur border-t border-white/10 px-4 pt-3 mobile-cart-bar">
          <button onClick={() => goto('cart')}
            className="w-full flex items-center justify-between gap-3 rounded-full px-5 py-3.5 bg-gradient-to-r from-neonPink to-neonPurple text-white shadow-glow-pink font-black min-h-[52px]">
            <span className="flex items-center gap-2">
              <span className="bg-ink/40 rounded-full w-7 h-7 flex items-center justify-center text-sm">{totalCount}</span>
              לעגלה
            </span>
            <span>{total}₪ ←</span>
          </button>
        </div>
      )}

      <Lightbox src={lightbox?.src} alt={lightbox?.alt || ''} onClose={() => setLightbox(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
