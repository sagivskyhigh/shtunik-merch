<!-- ACCESSIBILITY WIDGET -->
<button id="a11y-btn" aria-label="פתח תפריט נגישות" aria-expanded="false" aria-controls="a11y-panel">♿</button>
<div id="a11y-panel" role="region" aria-label="אפשרויות נגישות">
  <div class="a11y-title">♿ נגישות</div>
  <button id="a11y-text-lg"   aria-pressed="false"><span class="a11y-icon">🔤</span> הגדל טקסט</button>
  <button id="a11y-contrast"  aria-pressed="false"><span class="a11y-icon">🌗</span> ניגודיות גבוהה</button>
  <button id="a11y-grayscale" aria-pressed="false"><span class="a11y-icon">⚫</span> גווני אפור</button>
  <button id="a11y-reset"><span class="a11y-icon">↺</span> איפוס</button>
</div>
<script>
(function(){
  var btn=document.getElementById('a11y-btn'),panel=document.getElementById('a11y-panel'),
      bL=document.getElementById('a11y-text-lg'),bC=document.getElementById('a11y-contrast'),
      bG=document.getElementById('a11y-grayscale'),bR=document.getElementById('a11y-reset'),b=document.body;
  var s=JSON.parse(localStorage.getItem('a11y')||'{}');
  if(s.large)   {b.classList.add('a11y-large-text');   bL.classList.add('active');bL.setAttribute('aria-pressed','true');}
  if(s.contrast){b.classList.add('a11y-high-contrast');bC.classList.add('active');bC.setAttribute('aria-pressed','true');}
  if(s.gray)    {b.classList.add('a11y-grayscale');    bG.classList.add('active');bG.setAttribute('aria-pressed','true');}
  function save(){localStorage.setItem('a11y',JSON.stringify({large:b.classList.contains('a11y-large-text'),contrast:b.classList.contains('a11y-high-contrast'),gray:b.classList.contains('a11y-grayscale')}));}
  btn.addEventListener('click',function(){var o=panel.classList.toggle('open');btn.setAttribute('aria-expanded',o);});
  document.addEventListener('click',function(e){if(!panel.contains(e.target)&&e.target!==btn){panel.classList.remove('open');btn.setAttribute('aria-expanded','false');}});
  function toggle(cls,el){var on=b.classList.toggle(cls);el.classList.toggle('active',on);el.setAttribute('aria-pressed',on);save();}
  bL.addEventListener('click',function(){toggle('a11y-large-text',bL);});
  bC.addEventListener('click',function(){toggle('a11y-high-contrast',bC);});
  bG.addEventListener('click',function(){toggle('a11y-grayscale',bG);});
  bR.addEventListener('click',function(){b.classList.remove('a11y-large-text','a11y-high-contrast','a11y-grayscale');[bL,bC,bG].forEach(function(x){x.classList.remove('active');x.setAttribute('aria-pressed','false');});localStorage.removeItem('a11y');});
})();
</script>

<script type="text/jsx-source" id="app-source">
const { useState, useCallback, useEffect } = React;

/* ── CONFIG ── */
const WEBHOOK_URL  = 'YOUR_MAKE_WEBHOOK_URL';
const SELECTOR_URL = 'https://selector.org.il/e/jPbB-gIr6Oj';
const EVENT_NAME   = 'שיטים';

const DEADLINE     = new Date('2026-07-05T07:00:00+03:00').getTime();

const priceFor = (n) => {
  if (n <= 0) return 0;
  if (n === 1) return 129;
  if (n === 2) return 219;
  if (n === 3) return 309;
  return 309 + (n - 3) * 100;
};

const DESIGNS = [
  { id: 1, label: 'A', color: "בז'",  shirt: 'shirt1.jpg', tank: 'tank1.jpg' },
  { id: 2, label: 'B', color: 'שחור', shirt: 'shirt2.jpg', tank: 'tank2.jpg' },
  { id: 3, label: 'C', color: 'לבן',  shirt: 'shirt3.jpg', tank: 'tank3.jpg' },
];

/* ── HELPERS ── */
function Img({ src, alt, className }) {
  className = className || '';
  const [err, setErr] = useState(false);
  if (err) return <div className={'img-missing ' + className}>Missing:<br />{src}</div>;
  return <img src={src} alt={alt} className={className} onError={() => setErr(true)} loading="lazy" />;
}

function NavLogo() {
  const [err, setErr] = useState(false);
  return (
    <div className="flex items-center gap-2">
      {!err
        ? <img src="logo.png" alt="Shtutnik" className="h-9 w-auto object-contain" onError={() => setErr(true)} />
        : <span className="neon-text font-black text-xl">👽 Shtutnik</span>}
    </div>
  );
}

/* ── COUNTDOWN ── */
function Countdown() {
  var calcTime = function() {
    var diff = Math.max(0, DEADLINE - Date.now());
    return {
      days:    Math.floor(diff / 86400000),
      hours:   Math.floor((diff % 86400000) / 3600000),
      minutes: Math.floor((diff % 3600000)  / 60000),
      seconds: Math.floor((diff % 60000)    / 1000),
      done:    diff === 0,
    };
  };
  const [t, setT] = useState(calcTime);
  useEffect(function() {
    var id = setInterval(function() { setT(calcTime()); }, 1000);
    return function() { clearInterval(id); };
  }, []);

  if (t.done) return <span className="text-neonYellow font-black text-lg">ההזמנות נסגרו!</span>;

  var units = [
    { v: t.days,    l: 'ימים'  },
    { v: t.hours,   l: 'שעות'  },
    { v: t.minutes, l: 'דקות'  },
    { v: t.seconds, l: 'שניות' },
  ];
  return (
    <div className="flex gap-2 justify-center" dir="ltr">
      {units.map((u) => (
        <div key={u.l} className="flex flex-col items-center px-3 py-2 rounded-xl bg-white/[0.08] border border-white/15 min-w-[54px]">
          <span className="text-2xl font-black text-neonYellow cd-num">{String(u.v).padStart(2,'0')}</span>
          <span className="text-[10px] text-white/55 font-bold">{u.l}</span>
        </div>
      ))}
    </div>
  );
}

/* ── DESIGN CARD ── */
function DesignCard({ design, onAdd }) {

      <div className="relative aspect-square overflow-hidden bg-ink">

        {thumbs.map((th) => (
          <button key={th.key}
            onClick={() => { setType(th.key); setSize(''); }}
            aria-pressed={type === th.key}

            style={{ aspectRatio: '1/1' }}>

            <div className={'absolute inset-0 flex items-end justify-center pb-1.5 text-[11px] font-black transition ' + (type === th.key ? 'bg-ember/25 text-white' : 'bg-black/45 text-white/75')}>{th.label}</div>

    </div>

}

/* ── LIGHTBOX ── */
function Lightbox({ src, alt, onClose }) {
  useEffect(function() {
    if (!src) return;
    document.body.classList.add('no-scroll');
    var fn = function(e) { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return function() { document.body.classList.remove('no-scroll'); window.removeEventListener('keydown', fn); };
  }, [src, onClose]);
  if (!src) return null;
  return (
    <div role="dialog" aria-modal="true" aria-label="תצוגה מורחבת"
      className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 animate-fadein"
      onClick={onClose}>
      <button onClick={(e) => { e.stopPropagation(); onClose(); }} aria-label="סגור"
        className="absolute top-4 end-4 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 text-white text-2xl flex items-center justify-center">✕</button>
      <Img src={src} alt={alt} className="max-w-[92vw] max-h-[88vh] object-contain rounded-2xl shadow-glow-ember" />
    </div>
  );
}

/* ── APP ── */

        <div className="embers absolute inset-0" />
        <div className="relative z-10 max-w-5xl mx-auto px-4 pt-12 pb-16 md:pt-20 md:pb-28 text-center">
          <div className="inline-block mb-4 px-4 py-1.5 rounded-full border border-ember/50 bg-ember/10 text-ember text-xs font-black tracking-widest">
            PRE-ORDER · {EVENT_NAME.toUpperCase()} EXCLUSIVE
          </div>
          <h1 className="text-5xl md:text-7xl font-black leading-[1.05] mb-6">
            <span className="neon-text">שטותניק</span><br />ברמות הכי גבוהות.
          </h1>
          <div className="flex flex-col sm:flex-row items-center justify-center gap-4 md:gap-6 mb-8 max-w-2xl mx-auto px-2">
            {[
              { icon: '📱', text: 'סורקים את החולצה' },
              { icon: '🎵', text: 'פלייליסט עם כל האומנים שניגנו לנו' },
              { icon: '❤️', text: 'שומרים את החוויה קרוב ללב' },
            ].map((item, i) => (
              <div key={i} className="flex sm:flex-col items-center gap-3 sm:gap-2 text-start sm:text-center flex-1">
                {i > 0 && <div className="hidden sm:block text-white/30 text-2xl">↓</div>}
                <div className="text-3xl shrink-0">{item.icon}</div>
                <div className="text-white/80 text-sm leading-snug">{item.text}</div>
              </div>
            ))}
          </div>
          <div className="flex flex-col sm:flex-row gap-3 justify-center">
            <button onClick={() => goto('catalog')}
              className="rounded-full px-8 py-4 text-base md:text-lg font-black bg-gradient-to-r from-ember via-neonPink to-neonPurple text-white shadow-glow-ember hover:scale-105 active:scale-95 transition min-h-[52px]">
              🛸 לדגמים
            </button>
            <button onClick={() => goto('cart')}
              className="rounded-full px-8 py-4 text-base md:text-lg font-bold border border-white/25 hover:bg-white/[0.08] transition min-h-[52px]">
              לעגלה ↓
            </button>
          </div>
          <p className="mt-4 text-xs text-white/45">מסירה ידנית באירוע בלבד · כמות מוגבלת · אחרי שזה נגמר — נגמר.</p>
        </div>
      </section>

      {/* COUNTDOWN */}
      <section className="bg-gradient-to-b from-ink via-[#200015] to-ink py-10 md:py-14 border-b border-white/[0.07]">
        <div className="max-w-2xl mx-auto px-4 text-center">
          <div className="text-xs font-black tracking-widest text-ember mb-3">⏳ DEADLINE לסגירת הזמנות</div>
          <Countdown />
          <p className="mt-4 text-white/70 text-sm md:text-base leading-relaxed max-w-lg mx-auto">
            דדליין לסגירת הזמנות מראש: הטיימר למעלה. לאחר מכן לא יתקבלו הזמנות!
            הכל מיוצר במיוחד לפי הזמנה, עם השקעה בכל פרט ופרט. נתראה ברחבה! ✌️👽
          </p>
        </div>
      </section>

      {/* CATALOG */}
      <section id="catalog" className="max-w-6xl mx-auto px-4 py-12 md:py-20">
        <div className="text-center mb-8 md:mb-10">
          <div className="text-xs font-black tracking-widest text-ember mb-2">3 DESIGNS · בחר עיצוב, סוג ומידה</div>
          <h2 className="text-3xl md:text-5xl font-black neon-text mb-5">הדגמים</h2>
          <div className="flex flex-wrap justify-center gap-2 mb-4">
            {[
              { icon: '🎨', label: '3 דיזיינים' },
              { icon: '👕', label: 'חולצה או גופייה' },
              { icon: '🖤', label: "בז' / שחור / לבן" },
              { icon: '📐', label: 'מידה S–XXL' },
            ].map((chip, i) => (
              <div key={i} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-sm">
                <span>{chip.icon}</span>
                <span className="font-bold text-white/80">{chip.label}</span>
              </div>
            ))}
          </div>
          <p className="text-white/50 text-xs md:text-sm max-w-md mx-auto">
            הצבע קבוע לכל דיזיין. בחרו חולצה או גופייה, בחרו מידה — ואז הוסיפו לעגלה.
          </p>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          {DESIGNS.map((d) => <DesignCard key={d.id} design={d} onAdd={addToCart} />)}
        </div>
      </section>

      {/* SPOTIFY STORY */}
      <section className="bg-gradient-to-b from-ink via-[#1a0010] to-ink py-10 md:py-16">
        <div className="max-w-3xl mx-auto px-4 text-center">
          <div className="inline-block mb-4 px-4 py-2 rounded-2xl border border-ember/30 bg-ember/[0.08] font-mono text-ember text-sm">
            SHTUTNIK · SPOTIFY · SHITIM
          </div>
          <h2 className="text-2xl md:text-4xl font-black mb-4">
            הברקוד על החולצה הוא <span className="neon-text">פלייליסט</span>.
          </h2>
          <p className="text-white/70 text-base md:text-lg leading-relaxed max-w-xl mx-auto">
            סורקים אותו ונפתח הפלייליסט של האירוע — כל האומנים, כל הסטים. הזיכרון נשמר על הבד. ❤️‍🔥
          </p>
        </div>
      </section>

      {/* CART */}
      <section id="cart" className="max-w-2xl mx-auto px-4 py-12 md:py-20">
        <div className="text-center mb-6">
          <div className="text-xs font-black tracking-widest text-ember mb-2">ORDER · העגלה שלך</div>
          <h2 className="text-3xl md:text-4xl font-black neon-text">בוא נסגור את זה</h2>
        </div>

        <div className="rounded-3xl border border-white/10 bg-white/[0.025] p-4 md:p-7">
          {totalCount === 0 ? (
            <div className="text-center py-10">
              <div className="text-5xl mb-3">🕳️</div>
              <p className="text-white/80 mb-1 font-bold text-lg">בינתיים אין לנו פה כלום עדיין!</p>
              <p className="text-white/45 text-sm mb-6">תחזרו לדגמים, תבחרו מידה — וקדימה לרחבה.</p>
              <button onClick={() => goto('catalog')}
                className="rounded-full px-6 py-3.5 font-black text-sm bg-gradient-to-r from-ember to-neonPink text-white shadow-glow-ember hover:scale-105 transition min-h-[48px]">
                🛸 לדגמים
              </button>
            </div>
          ) : (
            <div>
              {/* Cart items */}
              <div className="space-y-2 mb-5">
                {cart.map((it) => (
                  <div key={it.uid} className="flex items-center gap-3 p-3 rounded-2xl border border-white/[0.08] bg-white/5">
                    <div className="w-14 h-14 rounded-xl overflow-hidden shrink-0 border border-white/10 bg-ink">
                      <Img src={it.image} alt="" className="w-full h-full object-cover" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-black text-sm">דיזיין {it.design.label} · {it.type}</div>
                      <div className="text-xs text-white/55 mt-0.5">צבע {it.design.color} · מידה {it.size}</div>
                    </div>
                    <button onClick={() => removeFromCart(it.uid)} aria-label="הסר פריט"
                      className="w-11 h-11 rounded-full bg-white/5 hover:bg-white/15 text-white/60 hover:text-white text-lg flex items-center justify-center transition">✕</button>
                  </div>
                ))}
              </div>

              {/* Price */}
              <div className="flex items-center justify-between p-4 rounded-2xl border border-ember/25 bg-ember/5 mb-4">
                <div>
                  <div className="text-xs text-white/55">{totalCount} {totalCount === 1 ? 'פריט' : 'פריטים'}</div>
                  <div className="text-4xl font-black neon-text">{total}<span className="text-2xl">₪</span></div>
                </div>
                <div className="text-end text-xs text-white/50 space-y-0.5">
                  <div>1 יח׳ = 129₪</div><div>2 יח׳ = 219₪</div><div>3 יח׳ = 309₪</div>
                  {totalCount > 3 && <div className="text-neonYellow">+100₪ לכל נוסף</div>}
                </div>
              </div>

              {/* Upsell */}
              {totalCount === 1 && (
                <div className="mb-4 p-4 rounded-2xl border border-neonPurple/35 bg-neonPurple/[0.08] text-sm text-white/85 leading-relaxed">
                  💡 קחו עוד פריט (אולי מתנה לחבר שעף איתכם ברחבה?) והמחיר ליחידה יורד משמעותית!
                </div>
              )}
              {totalCount === 2 && (
                <div className="mb-4 p-4 rounded-2xl border border-ember/35 bg-ember/[0.08] text-sm text-white/85 leading-relaxed">
                  🔥 פסיעה מהדיל המלא! פריט שלישי יוזיל לכם את המחיר פר יחידה למקסימום.
                </div>
              )}

              {/* Reassurance */}
              <div className="mb-5 p-4 rounded-2xl border border-ember/25 bg-ember/[0.06] text-sm text-white/80 leading-relaxed">
                🔒 מלאו שם, עברו לתשלום מאובטח בסלקטור, ואנחנו נשריין לכם את המידות והדגמים! ההזמנה תחכה לכם בעמדה באירוע עם סריקת הברקוד של סלקטור.
              </div>

              {/* Name input */}
              <div className="mb-4">
                <label className="block text-xs font-black text-white/50 mb-2 tracking-wide">שם מלא</label>
                <input
                  type="text" value={name} onChange={(e) => setName(e.target.value)}
                  placeholder="למשל: שגיב כהן"
                  className="w-full rounded-2xl px-4 py-3.5 bg-white/[0.06] border border-white/15 text-white placeholder-white/30 focus:border-ember/60 focus:outline-none transition min-h-[52px]" />
              </div>

              {/* CTA */}
              <button onClick={submitOrder} disabled={!name.trim() || loading}
                className={'w-full rounded-full px-6 py-5 text-lg font-black transition min-h-[60px] ' + (!name.trim() || loading ? 'bg-white/[0.08] text-white/35 cursor-not-allowed' : 'bg-gradient-to-r from-ember to-neonPink text-white shadow-glow-ember hover:scale-[1.02] active:scale-95')}>
                {loading ? '⏳ מעביר לתשלום...' : !name.trim() ? '✍️ מלאו שם מלא כדי לעבור לתשלום' : 'מעבר לתשלום מאובטח בסלקטור 🔒'}
              </button>

              <p className="text-center text-xs text-white/40 mt-3 leading-relaxed">
                אנחנו שומרים אצלנו רק את השם המלא, הדגמים והמידות שהזמנתם — כדי לשריין אותם עבורכם באירוע. 👽
              </p>
            </div>
          )}
        </div>
      </section>

      {/* FOOTER */}
      <footer className="border-t border-white/10">
        <div className="max-w-6xl mx-auto px-4 py-10 text-center text-white/50 text-sm space-y-1.5">
          <div className="text-2xl">✌️ 👽 💜</div>
          <div className="font-black neon-text text-base">Shtutnik</div>
          <div>נתראה ב{EVENT_NAME}.</div>
          <div className="text-xs text-white/30 pt-3">© {new Date().getFullYear()} Shtutnik · כל הזכויות והאהבה שמורות.</div>
        </div>
      </footer>

      {/* MOBILE STICKY CART BAR */}
      {totalCount > 0 && (
        <div className="md:hidden fixed bottom-0 inset-x-0 z-30 bg-ink/95 backdrop-blur border-t border-white/10 px-4 pt-3 mobile-cart-bar">
          <button onClick={() => goto('cart')}
            className="w-full flex items-center justify-between gap-3 rounded-full px-5 py-3.5 bg-gradient-to-r from-ember to-neonPink text-white shadow-glow-ember font-black min-h-[52px]">
            <span className="flex items-center gap-2">
              <span className="bg-ink/40 rounded-full w-7 h-7 flex items-center justify-center text-sm">{totalCount}</span>
              לעגלה
            </span>
            <span>{total}₪ ←</span>
          </button>
        </div>
      )}

      <Lightbox src={lightbox ? lightbox.src : null} alt={lightbox ? lightbox.alt : ''} onClose={() => setLightbox(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Manual Babel transform: classic JSX runtime, then execute -->
<script>
(function () {
  function boot() {
    try {
      var src = document.getElementById('app-source').textContent;
      var out = Babel.transform(src, {
        presets: ['env', ['react', { runtime: 'classic' }]]
      }).code;
      var s = document.createElement('script');
      s.textContent = out;
      document.body.appendChild(s);
    } catch (e) {
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;text-align:center;color:#fff;font-family:Heebo,sans-serif">' +
        '<div style="font-size:40px">😵‍💫</div><p>שגיאה בטעינת האתר. רעננו את הדף.</p>' +
        '<pre style="color:#FF6B35;font-size:11px;white-space:pre-wrap">' + (e && e.message) + '</pre></div>';
      console.error('App boot failed:', e);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
